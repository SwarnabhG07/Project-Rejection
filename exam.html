<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HireHub - Live Assessment</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="stylesheet" href="\static\styleexam.css">
</head>
<body>

    <div class="exam-container" id="exam-ui">
        <h2 style="color: #dc3545; margin-bottom: 30px; border-bottom: 1px solid #eee; padding-bottom: 15px;">
            <i class="fas fa-circle" style="font-size: 12px; vertical-align: middle; animation: pulse-red 1.5s infinite;"></i> LIVE EXAM IN PROGRESS
        </h2>

        <div id="question-text" style="font-size: 18px; font-weight: 600; margin-bottom: 25px; line-height: 1.5;">Loading question...</div>

        <form id="exam-form">
            <textarea name="spoken_answer" id="transcription-box" placeholder="Click 'Start Answering' and begin speaking, or type your answer here..." style="width: 100%; height: 180px; padding: 15px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 25px; resize: none; font-size: 16px; outline: none; background: #fafbfc; line-height: 1.5;" required></textarea>

            <div style="display: flex; gap: 15px;">
                <button type="button" class="btn btn-record" id="record-btn">
                    <i class="fas fa-microphone"></i> Start Answering
                </button>
                <button type="button" class="btn btn-redo" id="redo-btn">
                    <i class="fas fa-undo"></i> Redo
                </button>
                <button type="submit" class="btn btn-submit" id="submit-btn">
                    Submit Answer <i class="fas fa-arrow-right"></i>
                </button>
            </div>
        </form>
    </div>

    <div class="floating-cam" id="cam-container">
        <div class="recording-indicator" id="indicator"></div>
        <video id="exam-cam" autoplay playsinline muted></video>
    </div>

    <script src="\static\js\scriptexam.js"></script>
</body>
</html>
